<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nosso Catálogo | SmartBBottle</title>
    <style>
        body { background: #0b1a2a; color: white; font-family: sans-serif; padding: 50px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .item { background: #162a3d; padding: 20px; border-radius: 10px; text-align: center; }
        img { width: 100%; border-radius: 5px; }
        h2 { color: #00d2ff; }
    </style>
</head>
<body>
    <h1 style="text-align: center; margin-bottom: 30px;">Catálogo de Produtos</h1>
    <div class="grid">
        <div class="item">
            <img src="link_da_garrafa_aqui" alt="Garrafa 1">
            <h2>Smart Classic</h2>
            <p>R$ 199,00</p>
        </div>
        <div class="item">
            <img src="link_do_sabor_aqui" alt="Sabor 1">
            <h2>Essência de Laranja</h2>
            <p>R$ 29,00</p>
        </div>
    </div>
</body>
</html>
